<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חשבונאות · פוגל · 67.codes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Frank+Ruhl+Libre:wght@500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1410;
  --paper:#f5f0e6;
  --paper-2:#ebe3d3;
  --plum:#6b2d4f;
  --plum-dark:#451a32;
  --plum-light:#9c4d74;
  --gold:#b8860b;
  --gold-light:#d9a93a;
  --teal:#2a6b62;
  --red:#b23a2e;
  --green:#3a7d4f;
  --line:#d4c9b3;
  --shadow:rgba(69,26,50,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);line-height:1.65;
  background-image:
    radial-gradient(circle at 15% 8%, rgba(156,77,116,.07), transparent 40%),
    radial-gradient(circle at 85% 92%, rgba(184,134,11,.06), transparent 40%);
  min-height:100vh;
}
.topbar{position:sticky;top:0;z-index:100;background:var(--plum-dark);color:var(--paper);display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.4rem;box-shadow:0 2px 20px var(--shadow);border-bottom:3px solid var(--gold)}
.brand{display:flex;align-items:center;gap:.6rem;font-weight:900;font-size:1.15rem;letter-spacing:-.5px}
.brand .turtle{font-size:1.4rem}
.brand small{font-weight:400;opacity:.7;font-size:.78rem;font-family:'JetBrains Mono',monospace}
.topbar-right{display:flex;align-items:center;gap:1rem}
.progress-mini{font-family:'JetBrains Mono',monospace;font-size:.8rem;opacity:.85}
.topbar-links{display:flex;gap:.4rem}
.topbar-links a{color:var(--paper);text-decoration:none;font-size:.8rem;font-weight:500;padding:.35rem .7rem;border-radius:8px;opacity:.75;transition:.15s}
.topbar-links a:hover{opacity:1;background:rgba(255,255,255,.1)}

.shell{display:flex;max-width:1280px;margin:0 auto}
nav.side{width:240px;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;padding:1.4rem .9rem;border-left:1px solid var(--line)}
nav.side h3{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin:1.2rem .5rem .5rem;font-weight:700}
nav.side h3:first-child{margin-top:0}
.navlink{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-radius:10px;color:var(--ink);text-decoration:none;font-weight:500;font-size:.9rem;cursor:pointer;transition:.18s;margin-bottom:.15rem}
.navlink:hover{background:var(--paper-2)}
.navlink.active{background:var(--plum);color:var(--paper);box-shadow:0 3px 10px var(--shadow)}
.navlink .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.78rem;background:var(--paper-2);color:var(--plum-dark);width:26px;height:26px;display:grid;place-items:center;border-radius:7px;flex-shrink:0}
.navlink.active .n{background:var(--gold);color:var(--plum-dark)}

main{flex:1;padding:2rem 2.4rem 5rem;min-width:0}
.lesson{display:none;animation:fade .4s ease}
.lesson.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.lesson-head{margin-bottom:1.6rem;padding-bottom:1.2rem;border-bottom:2px solid var(--line)}
.lesson-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.75rem;background:var(--plum);color:var(--paper);padding:.25rem .7rem;border-radius:20px;margin-bottom:.7rem;font-weight:700;letter-spacing:.5px}
.lesson h1{font-family:'Frank Ruhl Libre',serif;font-size:2.2rem;font-weight:900;line-height:1.2;color:var(--plum-dark)}
.lesson .sub{font-size:1.05rem;color:#6a5d52;margin-top:.4rem}

h2.block{font-family:'Frank Ruhl Libre',serif;font-size:1.5rem;font-weight:700;color:var(--plum-dark);margin:2.2rem 0 .9rem;display:flex;align-items:center;gap:.6rem}
h2.block .ico{font-size:.85rem;background:var(--gold);color:#fff;width:30px;height:30px;display:grid;place-items:center;border-radius:9px;flex-shrink:0}
h3.sub-block{font-size:1.15rem;font-weight:700;color:var(--plum);margin:1.4rem 0 .5rem}
p{margin:.7rem 0}
strong{color:var(--plum-dark);font-weight:700}

.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.3rem 1.5rem;margin:1.1rem 0;box-shadow:0 4px 18px var(--shadow)}
.idea{background:linear-gradient(135deg,var(--plum-dark),var(--plum));color:var(--paper);border:none}
.idea h2.block,.idea strong{color:var(--gold-light)}
.idea .ico{background:var(--gold)}
.key{border-right:5px solid var(--gold);background:var(--paper-2);border-radius:8px;padding:.9rem 1.2rem;margin:1rem 0}
.key b{color:var(--gold)}
.trick{border-right:5px solid var(--red);background:#fae8e5;border-radius:8px;padding:.9rem 1.2rem;margin:1rem 0}
.trick::before{content:'⚡ טריק למבחן';display:block;font-weight:900;color:var(--red);font-size:.85rem;margin-bottom:.3rem}

.tbl-wrap{overflow-x:auto;margin:1.1rem 0;border-radius:12px;border:1px solid var(--line)}
table{border-collapse:collapse;width:100%;background:#fff;font-size:.92rem}
th,td{padding:.6rem .8rem;text-align:center;border:1px solid var(--line)}
th{background:var(--plum-dark);color:var(--paper);font-weight:700;font-size:.85rem}
tr:nth-child(even) td{background:var(--paper)}
td.hl{background:var(--gold-light)!important;font-weight:700}
td.r{text-align:right}
.formula-cell{font-family:'JetBrains Mono',monospace;color:var(--plum);font-weight:700}

/* journal entry table */
.journal{font-family:'Heebo';width:100%;border-collapse:collapse;margin:.6rem 0;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.journal th{background:var(--plum-dark);color:#fff;font-size:.8rem;padding:.45rem}
.journal td{padding:.45rem .8rem;border:1px solid var(--line);font-size:.92rem}
.journal .debit{text-align:right;background:#fff}
.journal .credit{text-align:right;padding-right:2.5rem;color:var(--teal);background:#fafbfa}
.journal .amt{font-family:'JetBrains Mono',monospace;text-align:center;width:90px}
.journal .ch{color:var(--plum);font-weight:700}
.journal .cr{color:var(--teal);font-weight:700}

.fbox{font-family:'JetBrains Mono',monospace;background:var(--plum-dark);color:var(--gold-light);padding:.5rem 1rem;border-radius:8px;display:inline-block;font-weight:700;margin:.3rem .2rem;font-size:1rem}
.fbox-row{display:flex;flex-wrap:wrap;gap:.4rem;margin:1rem 0}

.calc{background:linear-gradient(160deg,#fff,var(--paper));border:2px solid var(--plum-light);border-radius:18px;padding:1.4rem 1.5rem;margin:1.4rem 0;box-shadow:0 6px 24px var(--shadow)}
.calc-title{font-weight:900;color:var(--plum-dark);font-size:1.1rem;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
.calc-title::before{content:'🧮';font-size:1.2rem}
.calc-desc{font-size:.9rem;color:#6a5d52;margin-bottom:1rem}
.calc-inputs{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem}
.inp-group{display:flex;flex-direction:column;gap:.25rem}
.inp-group label{font-size:.8rem;font-weight:700;color:var(--plum)}
.inp-group input,.inp-group select{font-family:'JetBrains Mono',monospace;font-size:1rem;padding:.5rem .7rem;border:1.5px solid var(--line);border-radius:9px;width:140px;background:#fff;color:var(--ink);text-align:center}
.inp-group input:focus,.inp-group select:focus{outline:none;border-color:var(--plum-light)}
.calc-out{background:var(--plum-dark);color:var(--paper);border-radius:12px;padding:1rem 1.2rem;font-size:.95rem;min-height:48px}
.calc-out .res{font-family:'JetBrains Mono',monospace;color:var(--gold-light);font-weight:700;font-size:1.15rem}
.calc-out .step{display:block;font-size:.85rem;opacity:.85;margin:.2rem 0;font-family:'JetBrains Mono',monospace}

button.btn{font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;background:var(--plum);color:var(--paper);border:none;padding:.55rem 1.2rem;border-radius:10px;font-size:.92rem;transition:.18s}
button.btn:hover{background:var(--plum-dark);transform:translateY(-1px)}
button.btn.gold{background:var(--gold)}
button.btn.gold:hover{background:var(--gold-light);color:var(--plum-dark)}
button.btn.ghost{background:transparent;color:var(--plum);border:1.5px solid var(--plum)}

.quiz{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.3rem 1.5rem;margin:1.1rem 0;box-shadow:0 4px 18px var(--shadow)}
.quiz .q{font-weight:700;color:var(--plum-dark);margin-bottom:.8rem;font-size:1.02rem}
.opt{display:block;width:100%;text-align:right;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:.6rem .9rem;margin:.4rem 0;cursor:pointer;font-size:.92rem;font-family:'Heebo',sans-serif;transition:.15s}
.opt:hover{border-color:var(--plum-light);background:var(--paper-2)}
.opt.correct{background:#d6ecdd;border-color:var(--green);color:var(--green);font-weight:700}
.opt.wrong{background:#fae8e5;border-color:var(--red);color:var(--red)}
.opt:disabled{cursor:default}
.quiz-fb{margin-top:.7rem;font-size:.9rem;padding:.6rem .9rem;border-radius:9px;display:none}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:#d6ecdd;color:var(--green)}
.quiz-fb.no{background:#fae8e5;color:var(--red)}

.lesson-nav{display:flex;justify-content:space-between;margin-top:3rem;padding-top:1.5rem;border-top:2px solid var(--line);gap:1rem}
.lesson-nav button{flex:1;max-width:260px}
.lesson-nav .spacer{flex:1}

.hero{text-align:center;padding:2rem 1rem 1rem}
.hero .turtle-big{font-size:3.5rem;margin-bottom:.5rem}
.hero h1{font-family:'Frank Ruhl Libre',serif;font-size:2.6rem;font-weight:900;color:var(--plum-dark);line-height:1.15}
.hero .sub{font-size:1.15rem;color:#6a5d52;max-width:620px;margin:.8rem auto 0}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;margin-top:2rem}
.topic-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.3rem;cursor:pointer;transition:.2s;box-shadow:0 4px 18px var(--shadow);border-top:4px solid var(--plum)}
.topic-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px var(--shadow)}
.topic-card .tc-n{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--gold);font-weight:700}
.topic-card h3{font-family:'Frank Ruhl Libre',serif;font-size:1.2rem;color:var(--plum-dark);margin:.3rem 0}
.topic-card p{font-size:.86rem;color:#6a5d52;margin:0}

.exam-strip{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--plum-dark);border-radius:14px;padding:1rem 1.4rem;margin:1.5rem 0;display:flex;align-items:center;gap:1rem;font-weight:700}
.exam-strip .big{font-size:1.6rem}

@media(max-width:880px){
  nav.side{display:none}
  main{padding:1.4rem 1.1rem 4rem}
  .lesson h1{font-size:1.7rem}
  .hero h1{font-size:2rem}
  .topbar-links a{font-size:.72rem;padding:.3rem .5rem}
}
.mobile-nav{display:none}
@media(max-width:880px){
  .mobile-nav{display:block;background:#fff;border:1px solid var(--line);border-radius:12px;padding:.6rem;margin-bottom:1.2rem}
  .mobile-nav select{width:100%;padding:.6rem;font-family:'Heebo';font-size:1rem;border:1.5px solid var(--line);border-radius:9px;background:var(--paper)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="turtle">🐢</span>
    <span>חשבונאות <small>פוגל · 67.codes</small></span>
  </div>
  <div class="topbar-right">
    <div class="progress-mini" id="progressMini">0 / 7 פרקים</div>
    <div class="topbar-links">
      <a href="index.html">⌂ מרכז</a>
    </div>
  </div>
</div>

<div class="shell">
  <nav class="side" id="sidenav"></nav>
  <main id="main"></main>
</div>

<script>
const visited=new Set();
const NAV=[
  {id:'home',n:'⌂',title:'דף הבית',group:'התחלה'},
  {id:'c1',n:'1',title:'יסודות ועקרונות',group:'חשבונאות · החומר למבחן'},
  {id:'c2',n:'2',title:'רישום כפול',group:'חשבונאות · החומר למבחן'},
  {id:'c3',n:'3',title:'מאזן ומשוואה',group:'חשבונאות · החומר למבחן'},
  {id:'c4',n:'4',title:'רווח והפסד',group:'חשבונאות · החומר למבחן'},
  {id:'c5',n:'5',title:'מלאי',group:'חשבונאות · החומר למבחן'},
  {id:'c6',n:'6',title:'פחת ורכוש קבוע',group:'חשבונאות · החומר למבחן'},
  {id:'c7',n:'7',title:'חתכי סוף שנה',group:'חשבונאות · החומר למבחן'},
  {id:'cheat',n:'∑',title:'דף נוסחאות',group:'כלים'},
];
function buildNav(){
  const nav=document.getElementById('sidenav');
  let html='',lastGroup='';
  NAV.forEach(item=>{
    if(item.group!==lastGroup){html+=`<h3>${item.group}</h3>`;lastGroup=item.group;}
    html+=`<a class="navlink" data-id="${item.id}" onclick="go('${item.id}')"><span class="n">${item.n}</span><span>${item.title}</span></a>`;
  });
  nav.innerHTML=html;
}
function go(id){
  document.querySelectorAll('.lesson').forEach(l=>l.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  if(/^c[1-7]$/.test(id)){visited.add(id);updateProgress();}
  window.scrollTo({top:0,behavior:'smooth'});
  document.querySelectorAll('.mnav').forEach(s=>s.value=id);
}
function updateProgress(){
  const count=[...visited].filter(v=>/^c[1-7]$/.test(v)).length;
  document.getElementById('progressMini').textContent=count+' / 7 פרקים';
}
function answer(btn,correct,fbId,explain){
  const parent=btn.closest('.quiz');
  parent.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  const fb=document.getElementById(fbId);
  if(correct){btn.classList.add('correct');fb.className='quiz-fb show ok';fb.innerHTML='✓ נכון! '+explain;}
  else{btn.classList.add('wrong');parent.querySelectorAll('.opt').forEach(o=>{if(o.dataset.correct==='1')o.classList.add('correct');});fb.className='quiz-fb show no';fb.innerHTML='✗ לא מדויק. '+explain;}
}
const PAGES={};

/* ---------- HOME ---------- */
PAGES.home=`
<section id="home" class="lesson active">
  <div class="hero">
    <div class="turtle-big">🐢🚀</div>
    <h1>חשבונאות פיננסית</h1>
    <p class="sub">הקורס של ד"ר פוגל — מהעקרונות ועד פקודות היומן והדוחות. תקצירים, מחשבונים וחידונים לקראת מועד ב'.</p>
  </div>
  <div class="exam-strip">
    <span class="big">📅</span>
    <span>מועד ב' · 17.6.2026. שאלה 1 (50% מהציון) היא תמיד טכנית: פקודות יומן → דוחות כספיים. שלוט בטכניקה והחצי הזה בכיס.</span>
  </div>
  <div class="cards-grid">
    <div class="topic-card" onclick="go('c1')"><div class="tc-n">פרק 1</div><h3>יסודות ועקרונות</h3><p>מהות החשבונאות, 4 ההנחות ו-7 העקרונות (עלות היסטורית, הקבלה, שמרנות...).</p></div>
    <div class="topic-card" onclick="go('c2')"><div class="tc-n">פרק 2</div><h3>רישום כפול</h3><p>חובה מול זכות, מתי כל חשבון גדל, פקודות יומן וכרטיסי T.</p></div>
    <div class="topic-card" onclick="go('c3')"><div class="tc-n">פרק 3</div><h3>מאזן ומשוואה</h3><p>המשוואה החשבונאית, נכסים מול התחייבויות, מבנה המאזן.</p></div>
    <div class="topic-card" onclick="go('c4')"><div class="tc-n">פרק 4</div><h3>רווח והפסד</h3><p>4 שכבות הרווח, עלות המכר, הכרה בהכנסה, בסיס צבירה מול מזומן.</p></div>
    <div class="topic-card" onclick="go('c5')"><div class="tc-n">פרק 5</div><h3>מלאי</h3><p>FIFO, LIFO, ממוצע משוקלל ונע, וכלל עלות-או-שוק-הנמוך.</p></div>
    <div class="topic-card" onclick="go('c6')"><div class="tc-n">פרק 6</div><h3>פחת ורכוש קבוע</h3><p>פחת קווי וסכום ספרות, ערך פנקסני, רווח/הפסד הון ממכירה.</p></div>
    <div class="topic-card" onclick="go('c7')"><div class="tc-n">פרק 7</div><h3>חתכי סוף שנה</h3><p>הוצאות/הכנסות מראש ולקבל/לשלם — הלב של שאלת פוגל.</p></div>
  </div>
</section>`;

/* ---------- C1: PRINCIPLES ---------- */
PAGES.c1=`
<section id="c1" class="lesson">
  <div class="mobile-nav"><select class="mnav" onchange="go(this.value)"></select></div>
  <div class="lesson-head">
    <span class="lesson-tag">פרק 1 · חשבונאות</span>
    <h1>יסודות ועקרונות</h1>
    <p class="sub">השפה של העסק — והכללים שעליהם הכל בנוי.</p>
  </div>

  <div class="card idea">
    <h2 class="block"><span class="ico">💡</span> הרעיון בגדול</h2>
    <p>חשבונאות היא <strong>שפת העסק</strong>: מערכת לאיסוף, רישום, מדידה והצגה של מידע כספי, כדי לספק בסיס לקבלת החלטות. כל מה שנלמד נשען על <strong>4 הנחות יסוד</strong> ו-<strong>7 עקרונות</strong>. אם מבינים אותם, כל פקודת יומן הופכת להגיונית.</p>
  </div>

  <h2 class="block"><span class="ico">🔄</span> תהליך הדיווח (4 שלבים)</h2>
  <div class="card">
    <p><strong>1. איסוף ותיעוד</strong> — זיהוי האירועים הכלכליים ותיעודם במסמכים.</p>
    <p><strong>2. רישום, מיון וסיכום</strong> — רישום במערכת הכפולה והפקת דוחות תקופתיים.</p>
    <p><strong>3. הצגת דוחות כספיים</strong> — סיכום לפי כללים מקובלים.</p>
    <p><strong>4. ביקורת והבעת דעה</strong> — רואה חשבון חיצוני בודק ומחווה דעתו.</p>
  </div>

  <h2 class="block"><span class="ico">⚖️</span> פיננסית מול ניהולית</h2>
  <div class="tbl-wrap"><table>
    <tr><th>נושא</th><th>פיננסית</th><th>ניהולית</th></tr>
    <tr><td>קהל יעד</td><td>גורמים חיצוניים</td><td>הנהלה פנימית</td></tr>
    <tr><td>כללים</td><td>כפופה לתקינה</td><td>אין חובת כללים</td></tr>
    <tr><td>מבט</td><td>בעיקר על העבר</td><td>צופה גם לעתיד</td></tr>
    <tr><td>דיוק</td><td>מדויקת ומבוקרת</td><td>אומדנים מותרים</td></tr>
  </table></div>

  <h2 class="block"><span class="ico">🏛️</span> 4 הנחות היסוד</h2>
  <div class="card">
    <p><strong>1. היישות החשבונאית</strong> — העסק נפרד מבעליו; רושמים רק את פעילות העסק עצמו.</p>
    <p><strong>2. עסק חי (המשכיות)</strong> — הנחה שהעסק ימשיך לפעול; אחרת יש להעריך נכסים לפי שווי מימוש.</p>
    <p><strong>3. תקופתיות</strong> — חלוקת חיי העסק לתקופות דיווח (בד"כ שנה).</p>

/* ============ ASSEMBLE & CALCULATORS ============ */
function init(){
  document.getElementById('main').innerHTML =
    PAGES.home+PAGES.c1+PAGES.c2+PAGES.c3+PAGES.c4+PAGES.c5+PAGES.c6+PAGES.c7+PAGES.cheat;
  buildNav();
  document.querySelectorAll('.mnav').forEach(sel=>{
    sel.innerHTML=NAV.map(i=>`<option value="${i.id}">${(i.n==='⌂'||i.n==='∑')?i.title:'פרק '+i.n+' · '+i.title}</option>`).join('');
  });
  go('home');
  calcBalance();calcEquation();calcCOGS();calcInv();calcDep();calcAccrual();
}
function calcBalance(){
  const d=+document.getElementById('deb2').value,c=+document.getElementById('cred2').value;
  const out=document.getElementById('outBalance');
  if(d===c) out.innerHTML=`<span class="res">✓ מאוזנת</span><span class="step">חובה ${d.toLocaleString()} = זכות ${c.toLocaleString()}. הפקודה תקינה.</span>`;
  else out.innerHTML=`<span class="res">✗ לא מאוזנת</span><span class="step">הפרש של ${Math.abs(d-c).toLocaleString()} ₪. כל פקודת יומן חייבת חובה = זכות.</span>`;
}
function calcEquation(){
  const a=+document.getElementById('assets3').value,l=+document.getElementById('liab3').value;
  document.getElementById('outEquation').innerHTML=
    `<span class="res">הון עצמי = ${(a-l).toLocaleString()} ₪</span>
     <span class="step">נכסים ${a.toLocaleString()} − התחייבויות ${l.toLocaleString()} = הון ${(a-l).toLocaleString()}</span>`;
}
function calcCOGS(){
  const o=+document.getElementById('open4').value,b=+document.getElementById('buy4').value,
        c=+document.getElementById('close4').value,s=+document.getElementById('sales4').value;
  const cogs=o+b-c, gross=s-cogs;
  document.getElementById('outCOGS').innerHTML=
    `<span class="res">עלות מכר = ${cogs.toLocaleString()} | רווח גולמי = ${gross.toLocaleString()} ₪</span>
     <span class="step">עלות מכר: ${o.toLocaleString()} + ${b.toLocaleString()} − ${c.toLocaleString()} = ${cogs.toLocaleString()}</span>
     <span class="step">רווח גולמי: ${s.toLocaleString()} − ${cogs.toLocaleString()} = ${gross.toLocaleString()}</span>`;
}
function calcInv(){
  const q0=+document.getElementById('q0_5').value,p0=+document.getElementById('p0_5').value,
        q1=+document.getElementById('q1_5').value,p1=+document.getElementById('p1_5').value,
        q2=+document.getElementById('q2_5').value,p2=+document.getElementById('p2_5').value,
        sold=+document.getElementById('sold_5').value;
  const totalQ=q0+q1+q2, remain=totalQ-sold;
  const out=document.getElementById('outInv');
  if(remain<0){ out.innerHTML='<span class="res">נמכרו יותר יחידות מהמלאי</span>'; return; }
  const totalCost=q0*p0+q1*p1+q2*p2;
  const avg=totalCost/totalQ;
  // FIFO: remaining = newest units (from last purchases back)
  let r=remain, fifo=0;
  const layersNewest=[[q2,p2],[q1,p1],[q0,p0]];
  for(const [q,p] of layersNewest){ const take=Math.min(r,q); fifo+=take*p; r-=take; if(r<=0)break; }
  // LIFO: remaining = oldest units (from first purchases forward)
  r=remain; let lifo=0;
  const layersOldest=[[q0,p0],[q1,p1],[q2,p2]];
  for(const [q,p] of layersOldest){ const take=Math.min(r,q); lifo+=take*p; r-=take; if(r<=0)break; }
  const wavg=remain*avg;
  out.innerHTML=
    `<span class="res">מלאי סגירה: ${remain} יח'</span>
     <span class="step">FIFO (נשארו החדשים): ${fifo.toLocaleString()} ₪</span>
     <span class="step">LIFO (נשארו הישנים): ${lifo.toLocaleString()} ₪</span>
     <span class="step">ממוצע משוקלל (${avg.toFixed(2)} ליח'): ${wavg.toFixed(0)} ₪</span>`;
}
function calcDep(){
  const cost=+document.getElementById('cost6').value,sal=+document.getElementById('salvage6').value,
        life=+document.getElementById('life6').value,yrs=+document.getElementById('years6').value;
  const out=document.getElementById('outDep');
  if(life<=0){ out.innerHTML='<span class="res">שנות חיים חייב להיות חיובי</span>'; return; }
  const annual=(cost-sal)/life;
  const accum=Math.min(annual*yrs, cost-sal);
  const book=cost-accum;
  out.innerHTML=
    `<span class="res">פחת שנתי = ${annual.toLocaleString()} ₪</span>
     <span class="step">(${cost.toLocaleString()} − ${sal.toLocaleString()}) ÷ ${life} = ${annual.toLocaleString()}</span>
     <span class="step">פחת נצבר אחרי ${yrs} שנים: ${accum.toLocaleString()}</span>
     <span class="step">ערך פנקסני: ${cost.toLocaleString()} − ${accum.toLocaleString()} = ${book.toLocaleString()}</span>`;
}
function calcAccrual(){
  const amt=+document.getElementById('amt7').value,m=+document.getElementById('month7').value;
  const out=document.getElementById('outAccrual');
  if(m<1||m>12){ out.innerHTML='<span class="res">חודש חייב להיות בין 1 ל-12</span>'; return; }
  const monthsThis=12-m+1;
  const perMonth=amt/12;
  const thisYear=perMonth*monthsThis;
  const nextYear=amt-thisYear;
  out.innerHTML=
    `<span class="res">השנה: ${thisYear.toLocaleString()} | מראש (לבאה): ${nextYear.toLocaleString()} ₪</span>
     <span class="step">${monthsThis} חודשים השנה × ${perMonth.toFixed(0)} = ${thisYear.toLocaleString()}</span>
     <span class="step">היתרה (${12-monthsThis} חודשים) = ${nextYear.toLocaleString()} → הוצאה/הכנסה מראש</span>`;
}
init();
</script>
