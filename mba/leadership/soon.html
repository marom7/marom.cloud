<div
  style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; background: linear-gradient(135deg, rgba(250, 237, 218, 0.4) 0%, rgba(255, 240, 225, 0.3) 100%); font-family: var(--font-sans);">

  <style>
    @keyframes buildBlock {

      0%,
      100% {
        transform: translateY(0px);
        opacity: 1;
      }

      50% {
        transform: translateY(-8px);
        opacity: 0.7;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes shimmer {
      0% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.6;
      }
    }

    .block {
      display: inline-block;
      width: 16px;
      height: 16px;
      background: var(--color-background-warning);
      border-radius: 2px;
      margin: 0 4px;
    }

    .block:nth-child(1) {
      animation: buildBlock 2s ease-in-out 0s infinite;
    }

    .block:nth-child(2) {
      animation: buildBlock 2s ease-in-out 0.2s infinite;
    }

    .block:nth-child(3) {
      animation: buildBlock 2s ease-in-out 0.4s infinite;
    }

    .main-title {
      font-size: clamp(48px, 10vw, 72px);
      font-weight: 500;
      color: var(--color-text-primary);
      margin: 0;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(16px, 4vw, 20px);
      color: var(--color-text-secondary);
      margin: 12px 0 0 0;
      font-weight: 400;
      line-height: 1.6;
    }

    .blocks-container {
      margin: 2rem 0 2.5rem 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      height: 40px;
      align-items: center;
    }

    .description {
      font-size: 14px;
      color: var(--color-text-tertiary);
      max-width: 360px;
      margin: 0;
      line-height: 1.7;
    }

    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--color-background-warning);
      margin: 1.5rem auto 0;
      border-radius: 2px;
      animation: shimmer 3s ease-in-out infinite;
    }
  </style>

  <div style="margin-bottom: 1rem;">
    <div class="blocks-container">
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
    </div>
  </div>

  <h1 class="main-title">בקרוב</h1>
  <p class="subtitle">עדיין עובדים עלי</p>

  <div class="accent-line"></div>

  <p class="description">אנחנו בטוחים שזה יהיה מדהים. חזרו בקרוב!</p>

</div>
