
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digi67 — ניטור OT | נמל אשדוד</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e14;
    --bg-panel: #121820;
    --bg-card: #1a2230;
    --border: #2a3545;
    --text-primary: #e0e6ed;
    --text-secondary: #7a8a9e;
    --text-dim: #4a5a6e;
    --green-glow: #00e676;
    --green-bg: #0a2e1a;
    --green-border: #155a30;
    --green-dot: #00c853;
    --red-glow: #ff1744;
    --red-bg: #2e0a0a;
    --red-border: #5a1515;
    --red-dot: #d50000;
    --accent: #42a5f5;
    --accent-dim: #1565c0;
    --yellow: #ffd740;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'IBM Plex Sans Hebrew', 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  .header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .logo {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    border: 1px solid var(--accent-dim); padding: 3px 8px; border-radius: 4px;
  }
  .ot-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    color: var(--yellow); letter-spacing: 1px;
    border: 1px solid var(--yellow); padding: 2px 6px; border-radius: 3px; opacity: 0.8;
  }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .stats-bar { display: flex; gap: 12px; }
  .stat-badge {
    display: flex; align-items: center; gap: 5px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-card);
  }
  .stat-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  .stat-badge.online .dot { background: var(--green-dot); box-shadow: 0 0 6px var(--green-glow); }
  .stat-badge.offline .dot { background: var(--red-dot); box-shadow: 0 0 6px var(--red-glow); }
  .stat-badge.total .dot { background: var(--accent); }

  .ping-indicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
  }
  .ping-indicator .spinner {
    width: 10px; height: 10px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .ping-indicator.idle .spinner { display: none; }
  .last-update { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
  .btn-refresh {
    background: var(--accent-dim); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px;
    font-family: 'IBM Plex Sans Hebrew', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
  }
  .btn-refresh:hover { background: var(--accent); }
  .btn-refresh.spinning svg { animation: spin 1s linear infinite; }
  .btn-refresh svg { width: 13px; height: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .filter-bar {
    padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); background: var(--bg-panel);
  }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary);
    font-family: 'IBM Plex Sans Hebrew', sans-serif; font-size: 12px; cursor: pointer;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .search-box {
    margin-right: auto; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-primary); font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; width: 180px; outline: none;
  }
  .search-box::placeholder { color: var(--text-dim); }
  .search-box:focus { border-color: var(--accent); }

  .main { padding: 20px 24px; }
  .category-section { margin-bottom: 24px; animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .category-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border);
  }
  .category-icon {
    width: 32px; height: 32px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .category-name { font-size: 15px; font-weight: 700; }
  .category-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-secondary); }
  .category-stats {
    margin-right: auto; display: flex; gap: 10px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  }
  .cat-stat { display: flex; align-items: center; gap: 4px; }
  .cat-stat .mini-dot { width: 6px; height: 6px; border-radius: 50%; }
  .cat-stat.on .mini-dot { background: var(--green-dot); }
  .cat-stat.off .mini-dot { background: var(--red-dot); }
  .toggle-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer;
    font-family: 'IBM Plex Sans Hebrew', sans-serif;
  }
  .toggle-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }

  .machines-grid { display: flex; flex-wrap: wrap; gap: 5px; transition: max-height 0.4s ease; }
  .machine-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 10px; border-radius: 5px; border: 1px solid;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; white-space: nowrap; user-select: none;
  }
  .machine-btn .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .machine-btn.online { background: var(--green-bg); border-color: var(--green-border); color: var(--green-glow); }
  .machine-btn.online .status-dot { background: var(--green-dot); box-shadow: 0 0 4px var(--green-glow); }
  .machine-btn.online:hover { background: #0f3d22; box-shadow: 0 0 10px rgba(0,230,118,0.12); transform: scale(1.04); }
  .machine-btn.offline { background: var(--red-bg); border-color: var(--red-border); color: #ff5252; }
  .machine-btn.offline .status-dot { background: var(--red-dot); box-shadow: 0 0 4px var(--red-glow); }
  .machine-btn.offline:hover { background: #3d0f0f; box-shadow: 0 0 10px rgba(255,23,68,0.12); transform: scale(1.04); }
  .machine-btn:active { transform: scale(0.96); }
  .machine-btn .radmin-icon { display: none; font-size: 10px; opacity: 0.7; }
  .machine-btn:hover .radmin-icon { display: inline; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .machine-btn.online .status-dot { animation: pulse 2.5s ease-in-out infinite; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-card); border: 1px solid var(--accent);
    color: var(--text-primary); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 300; opacity: 0; transition: all 0.3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .tooltip {
    position: fixed; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 12px; z-index: 200;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    min-width: 200px; direction: rtl; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-addr { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .tooltip .tt-row { color: var(--text-secondary); font-size: 11px; margin-top: 2px; }
  .tooltip .tt-row span { color: var(--text-primary); }
  .tooltip .tt-hint { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); color: var(--accent); font-size: 10px; }

  .error-banner {
    background: var(--red-bg); border-bottom: 1px solid var(--red-border);
    padding: 8px 24px; font-size: 12px; color: #ff5252; display: none; align-items: center; gap: 8px;
  }
  .error-banner.show { display: flex; }

  @media (max-width: 768px) {
    .header, .filter-bar, .main { padding-right: 12px; padding-left: 12px; }
    .machine-btn { font-size: 10px; padding: 4px 7px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-right">
    <span class="logo">digi67</span>
    <span class="ot-badge">OT LOCAL</span>
    <h1>ניטור רשת — מחשבים מוקשחים</h1>
  </div>
  <div class="header-left">
    <div class="stats-bar">
      <div class="stat-badge total"><span class="dot"></span><span id="totalCount">0</span> סה״כ</div>
      <div class="stat-badge online"><span class="dot"></span><span id="onlineCount">0</span> מחוברים</div>
      <div class="stat-badge offline"><span class="dot"></span><span id="offlineCount">0</span> מנותקים</div>
    </div>
    <div class="ping-indicator idle" id="pingIndicator"><div class="spinner"></div><span>סורק...</span></div>
    <span class="last-update" id="lastUpdate"></span>
    <button class="btn-refresh" id="btnRefresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      סרוק עכשיו
    </button>
  </div>
</header>

<div class="error-banner" id="errorBanner">⚠ לא ניתן להתחבר לשירות digi67</div>

<div class="filter-bar">
  <input type="text" class="search-box" id="searchBox" placeholder="חיפוש כתובת...">
  <button class="filter-btn active" data-filter="all">הכל</button>
  <button class="filter-btn" data-filter="online">מחוברים</button>
  <button class="filter-btn" data-filter="offline">מנותקים</button>
</div>

<main class="main" id="mainContent"></main>

<div class="tooltip" id="tooltip">
  <div class="tt-addr"></div>
  <div class="tt-row">סטטוס: <span class="tt-status"></span></div>
  <div class="tt-row tt-ping-row">Ping: <span class="tt-ping"></span></div>
  <div class="tt-row tt-seen-row">נראה לאחרונה: <span class="tt-seen"></span></div>
  <div class="tt-hint">🖱️ לחץ לחיבור Radmin</div>
</div>

<div class="toast" id="toast"><span>🖥️</span><span class="toast-text"></span></div>

<script>
// ═══════════════════════════════════════
// ZERO hardcoded categories or machines
// Everything comes from /api/status
// ═══════════════════════════════════════

const API_BASE = '';
const POLL_INTERVAL = 10000;

let machines = [];
let categories = []; // populated from API
let currentFilter = 'all';
let toastTimer = null;

// ── Fetch ──
async function fetchStatus() {
  try {
    const resp = await fetch(`${API_BASE}/results.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(resp.statusText);
    const data = await resp.json();

    machines = data.machines || [];

    // Dynamic categories from results.json (written by agent from machines.json)
    if (data.categories && data.categories.length) {
      categories = data.categories;
    }

    document.getElementById('errorBanner').classList.remove('show');

    const ind = document.getElementById('pingIndicator');
    data.isPinging ? ind.classList.remove('idle') : ind.classList.add('idle');

    render();
    updateStats();
    updateTimestamp(data.timestamp);
  } catch {
    document.getElementById('errorBanner').classList.add('show');
  }
}

// ── Trigger Scan — not available, agent runs on its own loop ──
async function triggerPing() {
  showToast('הסריקה רצה אוטומטית כל דקה');
}

// ── Radmin (client-side protocol) ──
function openRadmin(address) {
  window.open(`radmin67://${address}`, '_self');
  showToast(`מתחבר ל-${address}...`);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.querySelector('.toast-text').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Generate dynamic category color (bg + border from hex color) ──
function catStyles(hexColor) {
  // Convert hex to muted bg: very dark version of the color
  const r = parseInt(hexColor.slice(1, 3), 16);
  const g = parseInt(hexColor.slice(3, 5), 16);
  const b = parseInt(hexColor.slice(5, 7), 16);
  return {
    bg: `rgba(${r}, ${g}, ${b}, 0.12)`,
    text: hexColor
  };
}

// ── Render — fully dynamic from API data ──
function render() {
  const main = document.getElementById('mainContent');
  const search = document.getElementById('searchBox').value.toLowerCase();
  main.innerHTML = '';

  // If no categories from API yet, derive from machines
  let cats = categories.length ? categories : deriveCategoriesFromMachines();

  cats.forEach((cat, idx) => {
    const catMachines = machines.filter(m => m.category === cat.key);
    if (!catMachines.length) return;

    const filtered = catMachines.filter(m => {
      const matchSearch = !search || m.address.toLowerCase().includes(search);
      const matchFilter = currentFilter === 'all' ||
        (currentFilter === 'online' && m.connected) ||
        (currentFilter === 'offline' && !m.connected);
      return matchSearch && matchFilter;
    });

    if (!filtered.length && (search || currentFilter !== 'all')) return;

    const onCount = catMachines.filter(m => m.connected).length;
    const style = catStyles(cat.color || '#7a8a9e');

    const section = document.createElement('div');
    section.className = 'category-section';
    section.style.animationDelay = `${idx * 0.04}s`;

    section.innerHTML = `
      <div class="category-header">
        <div class="category-icon" style="background:${style.bg}; color:${style.text}">
          ${cat.icon || '📦'}
        </div>
        <span class="category-name">${cat.name}</span>
        <span class="category-count">(${catMachines.length})</span>
        <div class="category-stats">
          <span class="cat-stat on"><span class="mini-dot"></span>${onCount}</span>
          <span class="cat-stat off"><span class="mini-dot"></span>${catMachines.length - onCount}</span>
        </div>
        <button class="toggle-btn" data-cat="${cat.key}">כווץ</button>
      </div>
      <div class="machines-grid" id="grid-${cat.key}">
        ${filtered.map(m => {
          const status = m.connected ? 'online' : 'offline';
          const label = m.address.replace('.ashdodport.co.il', '');
          const pingMs = m.pingMs ? `${Math.round(m.pingMs)}ms` : '';
          const lastSeen = m.lastSeen ? fmtTime(m.lastSeen) : 'לא נצפה';
          return `<div class="machine-btn ${status}"
            data-address="${m.address}" data-ping="${pingMs}" data-seen="${lastSeen}">
            <span class="status-dot"></span>
            <span>${label}</span>
            <span class="radmin-icon">🖥️</span>
          </div>`;
        }).join('')}
      </div>
    `;
    main.appendChild(section);
  });

  // Events
  main.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const grid = document.getElementById(`grid-${btn.dataset.cat}`);
      if (grid.style.maxHeight === '0px') {
        grid.style.maxHeight = grid.scrollHeight + 'px'; grid.style.overflow = ''; btn.textContent = 'כווץ';
      } else {
        grid.style.maxHeight = '0px'; grid.style.overflow = 'hidden'; btn.textContent = 'הרחב';
      }
    });
  });

  main.querySelectorAll('.machine-btn').forEach(btn => {
    btn.addEventListener('click', () => openRadmin(btn.dataset.address));
    btn.addEventListener('mouseenter', showTip);
    btn.addEventListener('mouseleave', hideTip);
  });
}

// Fallback: if API doesn't send categories, build from machine data
function deriveCategoriesFromMachines() {
  const map = {};
  machines.forEach(m => {
    if (!map[m.category]) {
      map[m.category] = { key: m.category, name: m.categoryHe || m.category, icon: '📦', color: '#7a8a9e' };
    }
  });
  return Object.values(map);
}

// ── Tooltip ──
const tooltip = document.getElementById('tooltip');
function showTip(e) {
  const btn = e.currentTarget;
  const isOn = btn.classList.contains('online');
  tooltip.querySelector('.tt-addr').textContent = btn.dataset.address;
  tooltip.querySelector('.tt-status').textContent = isOn ? '🟢 מחובר' : '🔴 מנותק';
  tooltip.querySelector('.tt-status').style.color = isOn ? 'var(--green-glow)' : '#ff5252';
  const pingRow = tooltip.querySelector('.tt-ping-row');
  if (btn.dataset.ping) { pingRow.style.display = ''; tooltip.querySelector('.tt-ping').textContent = btn.dataset.ping; }
  else { pingRow.style.display = 'none'; }
  tooltip.querySelector('.tt-seen').textContent = btn.dataset.seen;
  const rect = btn.getBoundingClientRect();
  tooltip.style.top = (rect.bottom + 8) + 'px';
  tooltip.style.left = (rect.left + rect.width / 2 - 100) + 'px';
  tooltip.classList.add('show');
}
function hideTip() { tooltip.classList.remove('show'); }

// ── Helpers ──
function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' }); }
  catch { return iso; }
}

function updateStats() {
  const total = machines.length;
  const online = machines.filter(m => m.connected).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('onlineCount').textContent = online;
  document.getElementById('offlineCount').textContent = total - online;
}

function updateTimestamp(iso) {
  if (!iso) return;
  const d = new Date(iso);
  document.getElementById('lastUpdate').textContent =
    `סריקה: ${d.toLocaleDateString('he-IL')} ${d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`;
}

// ── Events ──
document.getElementById('btnRefresh').addEventListener('click', function () {
  this.classList.add('spinning'); triggerPing();
  setTimeout(() => this.classList.remove('spinning'), 1500);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentFilter = btn.dataset.filter; render();
  });
});

document.getElementById('searchBox').addEventListener('input', () => render());

// ── Init ──
fetchStatus();
setInterval(fetchStatus, POLL_INTERVAL);
</script>
</body>
</html>
