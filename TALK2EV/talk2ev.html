<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>talk2ev.app – ABB Terra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Hebrew:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff88;
      --green-dim: #00cc6a;
      --green-glow: rgba(0, 255, 136, 0.3);
      --red: #ff4466;
      --blue: #00ccff;
      --bg: #060a0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(0,255,136,0.18);
      --text: #d0e8d8;
      --muted: #4d7560;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Hebrew', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow behind battery */
    body::after {
      content: '';
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,10,15,0.8);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px var(--green-glow);
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,255,136,0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--green);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .dot.charging { animation: blink 1s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
      50% { opacity: 0.3; box-shadow: none; }
    }

    /* ── BATTERY SECTION ── */
    .battery-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
      padding: 12px 0;
    }

    .battery-outer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Battery terminal (cap) */
    .battery-cap {
      width: 80px;
      height: 16px;
      background: linear-gradient(180deg, #2a3a2d, #1a2820);
      border: 2px solid #2a3a2d;
      border-bottom: none;
      border-radius: 10px 10px 0 0;
    }

    /* Battery body */
    .battery-body {
      width: 220px;
      height: 360px;
      border: 3px solid rgba(0,255,136,0.25);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      background: rgba(6,10,15,0.95);
      box-shadow:
        0 0 0 1px rgba(0,255,136,0.1),
        0 0 60px rgba(0,255,136,0.15),
        inset 0 0 40px rgba(0,0,0,0.8);
    }

    /* Inner fill */
    .battery-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s;
      border-radius: 0 0 20px 20px;
    }

    .battery-fill.low {
      background: linear-gradient(180deg, #ff4466 0%, #cc2244 100%);
      box-shadow: 0 0 30px rgba(255,68,102,0.5);
    }

    .battery-fill.mid {
      background: linear-gradient(180deg, #ffaa00 0%, #cc8800 100%);
      box-shadow: 0 0 30px rgba(255,170,0,0.5);
    }

    .battery-fill.high {
      background: linear-gradient(180deg, #00ff88 0%, #00cc6a 100%);
      box-shadow: 0 0 40px rgba(0,255,136,0.6);
    }

    /* Liquid shimmer overlay */
    .battery-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { left: -60%; }
      100% { left: 160%; }
    }

    /* Segment lines */
    .battery-segments {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      pointer-events: none;
      padding: 12px 0;
    }

    .segment-line {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    /* Center percent display */
    .battery-percent {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    .pct-num {
      font-family: 'Space Mono', monospace;
      font-size: 58px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 30px rgba(255,255,255,0.8);
    }

    .pct-sym {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      color: rgba(255,255,255,0.6);
    }

    /* Lightning bolt when charging */
    .bolt {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      opacity: 0;
      transition: opacity 0.3s;
      animation: boltPulse 0.8s ease-in-out infinite;
      z-index: 10;
    }

    .bolt.active { opacity: 1; }

    @keyframes boltPulse {
      0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
      50% { transform: translateX(-50%) scale(1.2); filter: brightness(1.5); }
    }

    /* ── STATS ROW ── */
    .stats-row {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-cell {
      background: rgba(6,10,15,0.95);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .stat-value.green { color: var(--green); text-shadow: 0 0 12px var(--green-glow); }
    .stat-value.red { color: var(--red); }
    .stat-value.blue { color: var(--blue); }

    /* ── BOTTOM PANEL ── */
    .bottom-panel {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      background: rgba(6,10,15,0.95);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      font-family: 'Noto Sans Hebrew', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 12px;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.15s;
    }

    button:active { transform: scale(0.97); }
    button:active::before { opacity: 1; }

    .btn-start {
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #000;
      font-size: 17px;
      box-shadow: 0 0 24px rgba(0,255,136,0.4), 0 4px 16px rgba(0,0,0,0.4);
    }

    .btn-start:disabled {
      background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    .btn-stop {
      background: linear-gradient(135deg, #ff4466, #cc2244);
      color: #fff;
      box-shadow: 0 0 16px rgba(255,68,102,0.3), 0 4px 12px rgba(0,0,0,0.4);
    }

    .btn-stop:disabled {
      background: rgba(255,68,102,0.15);
      color: rgba(255,68,102,0.3);
      box-shadow: none;
      cursor: not-allowed;
    }

    .btn-status {
      background: rgba(0,204,255,0.12);
      border: 1px solid rgba(0,204,255,0.3);
      color: var(--blue);
      box-shadow: 0 0 12px rgba(0,204,255,0.1);
    }

    /* ── POWER INDICATOR ── */
    .power-bar-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .power-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .power-bar-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .power-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00ff88, #00ffcc);
      box-shadow: 0 0 8px var(--green);
      width: 0%;
      transition: width 0.5s ease;
    }

    .power-val {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--green);
      white-space: nowrap;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(6,10,15,0.95);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 24px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--green);
      z-index: 100;
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 0 30px rgba(0,255,136,0.2);
      backdrop-filter: blur(12px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-name">talk2ev.app</div>
      <div class="brand-sub">ABB Terra AC • 11kW</div>
    </div>
    <div class="status-pill">
      <div id="dot" class="dot"></div>
      <span id="statusLabel">STANDBY</span>
    </div>
  </header>

  <!-- BATTERY -->
  <div class="battery-section">
    <div class="battery-outer">
      <div class="battery-cap"></div>
      <div class="battery-body">
        <div id="fill" class="battery-fill high" style="height: 20%"></div>
        <div class="battery-segments">
          <div class="segment-line"></div>
          <div class="segment-line"></div>
          <div class="segment-line"></div>
          <div class="segment-line"></div>
        </div>
        <div id="bolt" class="bolt">⚡</div>
        <div class="battery-percent">
          <span id="pctNum" class="pct-num">20</span><span class="pct-sym">%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-label">קוט״ש נטען</div>
      <div id="kwhVal" class="stat-value green">0.00</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">עלות</div>
      <div id="costVal" class="stat-value">0.00 ₪</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">זמן התחלה</div>
      <div id="timeVal" class="stat-value blue">--:--</div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="btn-row">
      <button id="btnStart" class="btn-start" onclick="startCharging()">⚡ התחל טעינה</button>
      <button id="btnStop" class="btn-stop" onclick="stopCharging()" disabled>⏹ עצור</button>
      <button class="btn-status" onclick="showStatus()">📡 פרטים</button>
    </div>
    <div class="power-bar-wrap">
      <span class="power-label">עוצמה</span>
      <div class="power-bar-track">
        <div id="powerBar" class="power-bar-fill"></div>
      </div>
      <span id="powerVal" class="power-val">0.0 kW</span>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script>
    let charging = false;
    let soc = 20;
    let kwh = 0;
    let startTime = null;
    let interval = null;

    const fill      = document.getElementById('fill');
    const pctNum    = document.getElementById('pctNum');
    const kwhVal    = document.getElementById('kwhVal');
    const costVal   = document.getElementById('costVal');
    const timeVal   = document.getElementById('timeVal');
    const bolt      = document.getElementById('bolt');
    const dot       = document.getElementById('dot');
    const statusLabel = document.getElementById('statusLabel');
    const btnStart  = document.getElementById('btnStart');
    const btnStop   = document.getElementById('btnStop');
    const powerBar  = document.getElementById('powerBar');
    const powerVal  = document.getElementById('powerVal');

    function render() {
      pctNum.textContent = Math.round(soc);
      fill.style.height = soc + '%';

      // Color by SOC
      fill.className = 'battery-fill ' + (soc < 25 ? 'low' : soc < 60 ? 'mid' : 'high');

      kwhVal.textContent = kwh.toFixed(2);
      costVal.textContent = (kwh * 0.62).toFixed(2) + ' ₪';

      // Power bar: ABB Terra 11kW max
      const kw = charging ? 7.2 : 0;
      powerBar.style.width = (kw / 11 * 100) + '%';
      powerVal.textContent = kw.toFixed(1) + ' kW';
    }

    function showToast(msg, duration = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    function startCharging() {
      if (charging || soc >= 100) return;
      charging = true;

      if (!startTime) {
        startTime = new Date();
        timeVal.textContent = startTime.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
      }

      dot.classList.add('charging');
      statusLabel.textContent = 'CHARGING';
      bolt.classList.add('active');
      btnStart.disabled = true;
      btnStop.disabled = false;

      showToast('⚡ טעינה החלה');

      interval = setInterval(() => {
        if (soc < 100) {
          soc = Math.min(100, soc + 1.5);
          kwh += 0.48;
          render();
        } else {
          stopCharging(true);
        }
      }, 160);
    }

    function stopCharging(full = false) {
      charging = false;
      clearInterval(interval);

      dot.classList.remove('charging');
      statusLabel.textContent = full ? 'FULL' : 'STANDBY';
      bolt.classList.remove('active');
      btnStart.disabled = soc >= 100;
      btnStop.disabled = true;

      render();
      showToast(full ? '✅ הטעינה הסתיימה – 100%' : '⏹ הטעינה עצרה');
    }

    function showStatus() {
      const elapsed = startTime
        ? Math.round((Date.now() - startTime) / 60000) + ' דק\''
        : '—';
      showToast(
        `🚗 SOC: ${Math.round(soc)}%  ⚡ ${kwh.toFixed(2)} kWh  💰 ${(kwh * 0.62).toFixed(2)}₪  ⏱ ${elapsed}`,
        4000
      );
    }

    render();
  </script>
</body>
</html>
